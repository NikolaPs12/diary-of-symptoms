server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router / hash-free SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Долгий кеш для неизменяемых ассетов Vite.
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot|ico|png|jpe?g|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
