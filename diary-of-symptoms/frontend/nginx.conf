server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker embedded DNS for runtime name resolution of service names
    resolver 127.0.0.11 valid=30s ipv6=off;
    # Use variable so nginx resolves backend at runtime via resolver
    set $backend_upstream backend:8000;

    # React Router / hash-free SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Долгий кеш для неизменяемых ассетов Vite.
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot|ico|png|jpe?g|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API requests to backend service inside Docker network.
    location /api/ {
        # proxy to backend service inside the Docker network (resolve at runtime)
        # preserve the full original request URI so backend receives /api/... paths
        proxy_pass http://$backend_upstream$request_uri;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location = /api {
        # exact /api requests should also forward the original URI
        proxy_pass http://$backend_upstream$request_uri;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
