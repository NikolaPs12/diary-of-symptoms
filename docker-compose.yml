services:
  db:
    image: postgres:16-alpine
    container_name: diary_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-diary_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: ${DB_NAME:-diary_symptoms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./diary-of-symptoms
      dockerfile: backend/DockerFile
    container_name: diary_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./diary-of-symptoms/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-diary_user}:${DB_PASSWORD:-change-me}@db:5432/${DB_NAME:-diary_symptoms}
      BACKEND_API_BASE_URL: http://backend:8000
    ports:
      - "8000:8000"

  telegram_bot:
    build:
      context: ./diary-of-symptoms
      dockerfile: backend/DockerFile
    container_name: diary_bot
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./diary-of-symptoms/.env
    environment:
      TOKEN: ${TOKEN:-}
      BACKEND_API_BASE_URL: http://backend:8000
    working_dir: /app/backend/app/tele_bot
    command: python tele_bot/main.py

  frontend:
    build:
      context: ./diary-of-symptoms/frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
    container_name: diary_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
